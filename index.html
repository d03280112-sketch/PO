<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>呼吸的圓</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #000000 70%);
      
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="circle"></div>
</body>
</html>
