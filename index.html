<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>修正版互動圓</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .container {
      display: flex;
      gap: 40px;
    }

    .item {
      text-align: center;
      color: white;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    /* 👉 外層負責放大 */
    .item:hover {
      transform: scale(1.3);
    }

    /* 👉 內層負責呼吸 */
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #000000 70%);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .text {
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .item:hover .text {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="item">
      <div class="circle"></div>
      <div class="text">第一顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第二顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第三顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第四顆</div>
    </div>
  </div>

</body>
</html>
