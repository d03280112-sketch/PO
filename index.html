<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>互動圓</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 40px;
    }

    .item {
      position: relative;
      text-align: center;
      color: white;
    }

    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #000000 70%);
      animation: breathe 3s ease-in-out infinite;
      cursor: pointer;
    }

    .text {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .item:hover .text {
      opacity: 1;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="item">
      <div class="circle"></div>
      <div class="text">第一顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第二顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第三顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第四顆</div>
    </div>

  </div>
</body>
</html>
