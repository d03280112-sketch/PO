<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>焦點圓</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .container {
      display: flex;
      gap: 40px;
    }

    .item {
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* 👉 當滑鼠進入整個區域，全部先縮小 */
    .container:hover .item {
      transform: scale(0.8);
      opacity: 0.4;
    }

    /* 👉 被滑到的那顆放大 */
    .item:hover {
      transform: scale(1.4) !important;
      opacity: 1 !important;
    }

    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #000000 70%);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    .text {
      text-align: center;
      color: white;
      margin-top: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    .item:hover .text {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="item">
      <div class="circle"></div>
      <div class="text">第一顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第二顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第三顆</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">第四顆</div>
    </div>
  </div>

</body>
</html>
