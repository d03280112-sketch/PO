<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>完整互動版</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* ===== 跑馬燈 ===== */
    .marquee {
      position: absolute;
      top: 50px;
      width: 100%;
      overflow: hidden;
    }

    .track {
      display: flex;
      gap: 20px;
      animation: scroll 20s linear infinite;
    }

    .track img {
      height: 80px;
      border-radius: 10px;
    }

    @keyframes scroll {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    /* ===== 圓區 ===== */
    .container {
      display: flex;
      gap: 50px;
    }

    .item {
      transition: transform 0.3s ease, opacity 0.3s ease;
      text-align: center;
    }

    /* 全部縮小 */
    .container:hover .item {
      transform: scale(0.8);
      opacity: 0.4;
    }

    /* 被選中的放大 */
    .item:hover {
      transform: scale(1.4) !important;
      opacity: 1 !important;
    }

    /* 圓本體（負責呼吸） */
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #000000 70%);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* 文字 */
    .text {
      margin-top: 12px;
      color: white;
      opacity: 0;
      transition: 0.3s;
    }

    .item:hover .text {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- 跑馬燈 -->
  <div class="marquee">
    <div class="track">
      <img src="https://raw.githubusercontent.com/d03280112-sketch/PO/refs/heads/main/image/DSC_0004.JPG">
      <img src="https://via.placeholder.com/150/888">
      <img src="https://via.placeholder.com/150/444">
      <img src="https://via.placeholder.com/150/222">
      <img src="https://via.placeholder.com/150/aaa">
    </div>
  </div>

  <!-- 圓 -->
  <div class="container">
    <div class="item">
      <div class="circle"></div>
      <div class="text">商品</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">品牌</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">關於我們</div>
    </div>

    <div class="item">
      <div class="circle"></div>
      <div class="text">聯絡</div>
    </div>
  </div>

</body>
</html>
